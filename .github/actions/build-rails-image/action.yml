name: Build Rails image
description: "Build a Sure Rails image. Modes: push (multi-arch to GHCR) or preview (single-arch tarball + manifest for ops-preview)."

inputs:
  mode:
    description: "build mode"
    required: true
    type: choice
    options: [push, preview]
  push:
    description: "Whether to push the image to the registry (push mode only). Mirrors workflow_dispatch inputs.push."
    required: false
    type: string
    default: "false"
  tag:
    description: "Image tag (e.g. '1.2.3' or 'sha-abc123')"
    required: true
    type: string
  sha:
    description: "Head commit SHA (recorded in BUILD_COMMIT_SHA and the preview manifest)"
    required: true
    type: string
  pr-number:
    description: "PR number (preview mode only; required to derive the image tag)"
    required: false
    type: string
    default: ""
  registry:
    description: "Container registry (push mode only)"
    required: false
    type: string
    default: "ghcr.io"
  image-name:
    description: "Image name (push mode only; defaults to the current repository)"
    required: false
    type: string
    default: ""

outputs:
  image-tag:
    description: "Image:tag that was built (push: registry/name:tag; preview: sure-preview-pr-<n>:<sha>)"
    value: ${{ steps.compute.outputs.image-tag }}
  image-id:
    description: "sha256 image id (sha256:...)"
    value: ${{ steps.inspect.outputs.image-id }}
  archive-path:
    description: "Path to the tarball (preview mode only)"
    value: ${{ steps.preview.outputs.archive-path }}
  manifest-path:
    description: "Path to the manifest JSON (preview mode only)"
    value: ${{ steps.preview.outputs.manifest-path }}

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Log in to the container registry
      if: inputs.mode == 'push' && inputs.push == 'true'
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Compute image reference
      id: compute
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        REGISTRY: ${{ inputs.registry }}
        IMAGE_NAME: ${{ inputs.image-name }}
        TAG: ${{ inputs.tag }}
        PR_NUMBER: ${{ inputs.pr-number }}
        SHA: ${{ inputs.sha }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        if [ "$MODE" = "preview" ]; then
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::pr-number is required in preview mode" >&2
            exit 1
          fi
          image_ref="sure-preview-pr-${PR_NUMBER}:${SHA}"
        else
          name="${IMAGE_NAME:-$REPO}"
          image_ref="${REGISTRY}/${name}:${TAG}"
        fi
        echo "image-tag=${image_ref}" >> "$GITHUB_OUTPUT"

    - name: Build image
      id: build
      shell: bash
      env:
        IMAGE_REF: ${{ steps.compute.outputs.image-tag }}
        SHA: ${{ inputs.sha }}
        MODE: ${{ inputs.mode }}
      run: |
        set -euo pipefail
        if [ "$MODE" = "preview" ]; then
          docker build \
            --platform linux/amd64 \
            --build-arg "BUILD_COMMIT_SHA=${SHA}" \
            -f Dockerfile.preview \
            -t "$IMAGE_REF" \
            .
        else
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "BUILD_COMMIT_SHA=${SHA}" \
            -t "$IMAGE_REF" \
            --push \
            .
        fi

    - name: Inspect image
      id: inspect
      shell: bash
      env:
        IMAGE_REF: ${{ steps.compute.outputs.image-tag }}
      run: |
        set -euo pipefail
        docker image inspect "$IMAGE_REF" >/dev/null
        image_id="$(docker image inspect --format '{{.Id}}' "$IMAGE_REF")"
        echo "image-id=${image_id}" >> "$GITHUB_OUTPUT"

    - name: Emit preview artifact (tarball + manifest)
      id: preview
      if: inputs.mode == 'preview'
      shell: bash
      env:
        IMAGE_REF: ${{ steps.compute.outputs.image-tag }}
        IMAGE_ID: ${{ steps.inspect.outputs.image-id }}
        PR_NUMBER: ${{ inputs.pr-number }}
        HEAD_SHA: ${{ inputs.sha }}
      run: |
        set -euo pipefail
        archive_path="$RUNNER_TEMP/sure-preview-image.tar.gz"
        manifest_path="$RUNNER_TEMP/sure-preview-image.manifest.json"
        checksum_path="$RUNNER_TEMP/sure-preview-image.sha256"

        docker save "$IMAGE_REF" | gzip -1 > "$archive_path"
        archive_sha256="$(sha256sum "$archive_path" | awk '{print $1}')"
        printf '%s\n' "$archive_sha256" > "$checksum_path"

        ARCHIVE_SHA256="$archive_sha256" \
        IMAGE_ID="$IMAGE_ID" \
        IMAGE_TAG="$IMAGE_REF" \
        PR_NUMBER="$PR_NUMBER" \
        HEAD_SHA="$HEAD_SHA" \
        node - "$manifest_path" <<'NODE'
        const fs = require('node:fs');
        const manifestPath = process.argv[2];
        const manifest = {
          artifactVersion: 1,
          archivePath: 'sure-preview-image.tar.gz',
          archiveSha256: process.env.ARCHIVE_SHA256,
          headSha: process.env.HEAD_SHA,
          imageId: process.env.IMAGE_ID,
          imageTag: process.env.IMAGE_TAG,
          prNumber: process.env.PR_NUMBER,
        };
        fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
        NODE
        jq -e . "$manifest_path" >/dev/null

        echo "archive-path=${archive_path}" >> "$GITHUB_OUTPUT"
        echo "manifest-path=${manifest_path}" >> "$GITHUB_OUTPUT"
