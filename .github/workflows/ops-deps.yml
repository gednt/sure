name: Dependabot Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge patch/minor Dependabot PRs
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch PR metadata
        id: meta
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title || '';
            const labels = (pr.labels || []).map(l => l.name);
            const isEcosystemLabel = labels.includes('dependencies');
            const isMajorBump = /\(major\)/.test(title) || /\(major\)/.test(pr.body || '');
            core.setOutput('is_ecosystem', isEcosystemLabel ? 'true' : 'false');
            core.setOutput('is_major', isMajorBump ? 'true' : 'false');

      - name: Skip non-dependencies PRs
        if: steps.meta.outputs.is_ecosystem != 'true'
        run: |
          echo "Not a Dependabot PR labelled 'dependencies'; skipping."

      - name: Skip major bumps
        if: steps.meta.outputs.is_major == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = [
              '👋 This PR bumps a **major** version. Per the `ops-deps` policy, major bumps are held for human review.',
              '',
              'Checklist:',
              '- [ ] CHANGELOG reviewed',
              '- [ ] Upgrade guide followed',
              '- [ ] Smoke test passed',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, body,
            });

      - name: Enable auto-merge
        if: |
          steps.meta.outputs.is_ecosystem == 'true' &&
          steps.meta.outputs.is_major != 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            try {
              await github.rest.pulls.enableAutoMerge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
              });
              core.notice(`Auto-merge enabled for PR #${pr.number}`);
            } catch (err) {
              if (String(err).includes('Not mergeable')) {
                core.setFailed(`PR is not mergeable: ${err}`);
                return;
              }
              throw err;
            }
