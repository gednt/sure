name: PR Preview

on:
  workflow_run:
    workflows: ["Pull Request"]
    types: [completed]
  pull_request:
    types: [closed, labeled, unlabeled]
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: read

jobs:
  build:
    name: Build preview image
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
    env:
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Check conclusion
        if: github.event.workflow_run.conclusion != 'success'
        run: |
          echo "Upstream PR run did not succeed; skipping preview build."
          exit 0

      - name: Checkout PR code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ env.HEAD_SHA }}
          persist-credentials: false

      - name: Check label
        id: label_check
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(process.env.PR_NUMBER),
            });
            const labels = pr.data.labels.map(l => l.name);
            const hasLabel = labels.includes('preview-cf');
            core.setOutput('has_label', hasLabel ? 'true' : 'false');

      - name: Build preview image
        if: steps.label_check.outputs.has_label == 'true'
        uses: ./.github/actions/build-rails-image
        with:
          mode: preview
          sha: ${{ env.HEAD_SHA }}
          pr-number: ${{ env.PR_NUMBER }}

      - name: Upload preview artifact
        if: steps.label_check.outputs.has_label == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: preview-image-pr-${{ env.PR_NUMBER }}-${{ env.HEAD_SHA }}
          path: |
            ${{ runner.temp }}/sure-preview-image.tar.gz
            ${{ runner.temp }}/sure-preview-image.sha256
            ${{ runner.temp }}/sure-preview-image.manifest.json
          if-no-files-found: error
          retention-days: 3

  deploy:
    name: Deploy to Cloudflare
    needs: [build]
    if: |
      github.event_name == 'workflow_run' &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: preview-deploy-${{ github.event.workflow_run.pull_requests[0].number }}
      cancel-in-progress: true
    environment: preview
    permissions:
      contents: read
    env:
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Resolve artifact
        id: resolve
        run: |
          set -euo pipefail
          echo "artifact_name=preview-image-pr-${PR_NUMBER}-${HEAD_SHA}" >> "$GITHUB_OUTPUT"

      - name: Download preview image artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: ${{ steps.resolve.outputs.artifact_name }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: ${{ runner.temp }}/preview-image

      - name: Verify artifact checksum
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/preview-image/sure-preview-image.tar.gz"
          checksum="$RUNNER_TEMP/preview-image/sure-preview-image.sha256"
          manifest="$RUNNER_TEMP/preview-image/sure-preview-image.manifest.json"
          test -f "$archive" || { echo "missing archive" >&2; exit 1; }
          test -f "$checksum" || { echo "missing checksum" >&2; exit 1; }
          test -f "$manifest" || { echo "missing manifest" >&2; exit 1; }
          expected="$(tr -d '[:space:]' < "$checksum")"
          actual="$(sha256sum "$archive" | awk '{print $1}')"
          [ "$expected" = "$actual" ] || { echo "checksum mismatch" >&2; exit 1; }

      - name: Load image
        run: |
          gzip -dc "$RUNNER_TEMP/preview-image/sure-preview-image.tar.gz" | docker load
          docker image inspect "sure-preview-pr-${PR_NUMBER}:${HEAD_SHA}" >/dev/null

      - name: Push to Cloudflare registry
        id: push
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PREVIEW_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          image_tag="sure-preview-pr-${PR_NUMBER}:${HEAD_SHA}"
          registry_ref="registry.cloudflare.com/${CLOUDFLARE_ACCOUNT_ID}/${image_tag}"
          # wrangler containers push validates wrangler.toml; use a minimal cfg.
          tmp="$(mktemp -d)"
          cat > "$tmp/wrangler.toml" <<EOF
          name = "sure-preview-${PR_NUMBER}"
          main = "src/index.ts"
          compatibility_date = "2025-01-01"
          [containers]
          image = "${registry_ref}"
          EOF
          push_log="$(mktemp)"
          (cd "$tmp" && npx --yes wrangler containers push "$image_tag") 2>&1 | tee "$push_log"
          image_ref="$(grep -Eo 'registry\.cloudflare\.com/[^ ]+' "$push_log" | head -1)"
          if [ -z "$image_ref" ]; then
            echo "::error::Could not extract Cloudflare image ref" >&2
            exit 1
          fi
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        env:
          IMAGE_REF: ${{ steps.push.outputs.image_ref }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const headSha = process.env.HEAD_SHA;
            const previewUrl = `https://sure-preview-${prNumber}.${process.env.CLOUDFLARE_WORKERS_SUBDOMAIN || 'preview'}.workers.dev`;
            const body = [
              '## Preview Deployment Ready',
              '',
              `**Preview URL:** ${previewUrl}`,
              '',
              `Deployed from commit ${headSha}.`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('Preview Deployment Ready'));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, body });
            }

  cleanup:
    name: Cleanup preview
    if: |
      (github.event_name == 'pull_request' && (github.event.action == 'closed' || (github.event.action == 'unlabeled' && github.event.label.name == 'preview-cf'))) ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Trigger Cloudflare cleanup
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PREVIEW_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "::notice::Cleanup invoked (event=${{ github.event_name }}). Cloudflare cleanup is a placeholder — implement via wrangler delete in a follow-up."
          echo "If you reached this step from a schedule, query the Cloudflare API for sure-preview-* workers older than 7 days and delete them."
