# ===========================================================================
# Docker Compose for running Sure from source code
# ===========================================================================
#
# Builds the app image from ./Dockerfile (source) instead of pulling a
# pre-built image from GHCR. Intended for local development / hacking on
# the codebase. The app runs in production mode inside the container.
#
# Usage:
#
#   docker compose up           # foreground
#   docker compose up -d        # detached
#   docker compose build        # rebuild after code changes
#   docker compose logs -f web  # tail web logs
#
# Web UI: http://localhost:3001  (host port mapped in .env / .env.local)
#
# Note: host port 3000 was already in use on this machine, so the web
# service is published on 3001 by default. Override with PORT=<n> in
# your .env file if needed.
# ===========================================================================

x-db-env: &db_env
  POSTGRES_USER: ${POSTGRES_USER:-sure_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sure_password}
  POSTGRES_DB: ${POSTGRES_DB:-sure_production}

x-rails-env: &rails_env
  <<: *db_env
  SECRET_KEY_BASE: ${SECRET_KEY_BASE:-a7523c3d0ae56415046ad8abae168d71074a79534a7062258f8d1d51ac2f76d3c3bc86d86b6b0b307df30d9a6a90a2066a3fa9e67c5e6f374dbd7dd4e0778e13}
  SELF_HOSTED: "true"
  RAILS_FORCE_SSL: "false"
  RAILS_ASSUME_SSL: "false"
  RAILS_ENV: "production"
  DB_HOST: db
  DB_PORT: 5432
  REDIS_URL: redis://redis:6379/1
  BINDING: "0.0.0.0"
  OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN:-}
  OPENAI_REQUEST_TIMEOUT: ${OPENAI_REQUEST_TIMEOUT:-60}
  LLM_MAX_ITEMS_PER_CALL: ${LLM_MAX_ITEMS_PER_CALL:-25}

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: sure-source:latest
    volumes:
      - app-storage:/rails/storage
    ports:
      - "${PORT:-3001}:3000"
    restart: unless-stopped
    environment:
      <<: *rails_env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - sure_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: sure-source:latest
    command: bundle exec sidekiq
    volumes:
      - app-storage:/rails/storage
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      <<: *rails_env
    networks:
      - sure_net

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      <<: *db_env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sure_net

  redis:
    image: redis:latest
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sure_net

volumes:
  app-storage:
  postgres-data:
  redis-data:

networks:
  sure_net:
    driver: bridge
    name: sure_net